<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio da Termoquímica - Offline</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --exo: #e67e22; /* Laranja para Exotérmica */
            --endo: #9b59b6; /* Roxo para Endotérmica */
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            width: 100%;
            text-align: center;
            padding: 1.5rem 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid var(--secondary);
            margin-bottom: 20px;
        }

        .equation { font-size: 1.1rem; text-align: center; line-height: 3; }
        .question { font-weight: bold; margin-bottom: 15px; display: block; }

        input {
            width: 45px;
            height: 35px;
            text-align: center;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            margin: 0 3px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .opt-btn {
            background: white;
            border: 2px solid var(--secondary);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
        }

        .opt-btn:hover { background: #ebf5fb; }

        .main-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        #feedback {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            min-height: 1.5rem;
        }

        .correct { border-color: var(--success); background: #d4edda; }
        .wrong { border-color: var(--error); background: #f8d7da; }
        sub { font-size: 0.75rem; }
    </style>
</head>
<body>

<header>
    <h1>Termoquímica Master</h1>
    <p>Balanceamento & Energia</p>
</header>

<div class="container" id="game-container">
    <div class="status-bar">
        <span>Fase: <span id="lvl">1</span>/8</span>
        <span>Pontos: <span id="pts">0</span></span>
    </div>

    <div id="content">
        </div>

    <div id="feedback"></div>
</div>

<script>
    const challenges = [
        {
            type: "balance",
            eq: '<input id="i1"> H<sub>2</sub> + <input id="i2"> O<sub>2</sub> → <input id="i3"> H<sub>2</sub>O',
            ans: ["2", "1", "2"],
            msg: "Balanceie a formação da água!"
        },
        {
            type: "quiz",
            q: "Se uma reação libera calor para o ambiente e o recipiente esquenta, ela é:",
            opts: ["Exotérmica", "Endotérmica", "Isotérmica"],
            ans: 0,
            note: "Dica: 'Exo' significa para fora."
        },
        {
            type: "balance",
            eq: '<input id="i1"> C<sub>3</sub>H<sub>8</sub> + <input id="i2"> O<sub>2</sub> → <input id="i3"> CO<sub>2</sub> + <input id="i4"> H<sub>2</sub>O',
            ans: ["1", "5", "3", "4"],
            msg: "Balanceie a combustão do propano."
        },
        {
            type: "quiz",
            q: "Na reação: N<sub>2</sub> + O<sub>2</sub> → 2 NO  (ΔH = +180 kJ). Esta reação é:",
            opts: ["Exotérmica (libera energia)", "Endotérmica (absorve energia)"],
            ans: 1,
            note: "Dica: Observe o sinal do ΔH!"
        },
        {
            type: "balance",
            eq: '<input id="i1"> Al + <input id="i2"> HCl → <input id="i3"> AlCl<sub>3</sub> + <input id="i4"> H<sub>2</sub>',
            ans: ["2", "6", "2", "3"],
            msg: "Desafio: Metais e Ácidos!"
        },
        {
            type: "quiz",
            q: "O que acontece com a entalpia (H) em uma reação exotérmica?",
            opts: ["H dos produtos é maior que a dos reagentes", "H dos reagentes é maior que a dos produtos", "A entalpia não muda"],
            ans: 1,
            note: "Se liberou energia, o produto final tem menos energia que o início."
        },
        {
            type: "balance",
            eq: '<input id="i1"> C<sub>2</sub>H<sub>5</sub>OH + <input id="i2"> O<sub>2</sub> → <input id="i3"> CO<sub>2</sub> + <input id="i4"> H<sub>2</sub>O',
            ans: ["1", "3", "2", "3"],
            msg: "Balanceie a combustão do Etanol!"
        },
        {
            type: "quiz",
            q: "O uso de um catalisador em uma reação química:",
            opts: ["Aumenta o ΔH da reação", "Diminui a energia de ativação", "Torna a reação endotérmica"],
            ans: 1,
            note: "Catalisadores são atalhos!"
        }
    ];

    let step = 0;
    let score = 0;

    function render() {
        const item = challenges[step];
        const display = document.getElementById('content');
        document.getElementById('lvl').innerText = step + 1;
        document.getElementById('feedback').innerText = "";

        if(item.type === "balance") {
            display.innerHTML = `<span class="question">${item.msg}</span><div class="box equation">${item.eq}</div><button class="main-btn" onclick="checkBalance()">Verificar</button>`;
        } else {
            let htmlOpts = item.opts.map((o, i) => `<button class="opt-btn" onclick="checkQuiz(${i})">${o}</button>`).join('');
            display.innerHTML = `<span class="question">${item.q}</span><div class="options-grid">${htmlOpts}</div>`;
        }
    }

    function checkBalance() {
        const item = challenges[step];
        let correct = true;
        item.ans.forEach((a, i) => {
            const val = document.getElementById(`i${i+1}`).value.trim();
            if(val !== a) correct = false;
        });
        showResult(correct);
    }

    function checkQuiz(idx) {
        showResult(idx === challenges[step].ans);
    }

    function showResult(win) {
        const f = document.getElementById('feedback');
        if(win) {
            f.innerText = "Correto! +100 pontos"; 
            f.style.color = "var(--success)";
            score += 100;
            document.getElementById('pts').innerText = score;
            setTimeout(next, 1200);
        } else {
            f.innerText = "Tente novamente! Analise com calma.";
            f.style.color = "var(--error)";
        }
    }

    function next() {
        step++;
        if(step < challenges.length) render();
        else {
            document.getElementById('game-container').innerHTML = `<div style="text-align:center"><h2>🏆 Alquimista Supremo!</h2><p>Você completou o desafio com ${score} pontos.</p><button class="main-btn" onclick="location.reload()">Reiniciar</button></div>`;
        }
    }

    render();
</script>
</body>
</html>
